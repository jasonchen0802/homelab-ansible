---
# tasks file for roles/proxmox-vm

- name: Validate and load mandatory host variables
  ansible.builtin.set_fact:
    # Hardware variables
    final_cores: >-
      {{ provision_specs.hardware.cores | default(hardware_defaults.cores) }}
    final_memory: >-
      {{ provision_specs.hardware.memory | default(hardware_defaults.memory) }}
    final_disk_size: >-
      {{
        provision_specs.hardware.disk_size | mandatory(
          'Error: provision_specs.hardware.disk_size is undefined in host_vars'
        )
      }}

    # Cloudinit variables
    final_ip: >-
      {{
        provision_specs.cloudinit.ip | mandatory(
          'Error: provision_specs.cloudinit.ip is undefined in host_vars'
        )
      }}
    final_gw: >-
      {{
        provision_specs.cloudinit.gw | mandatory(
          'Error: provision_specs.cloudinit.gw is undefined in host_vars'
        )
      }}
    final_ci_user: >-
      {{
        provision_specs.cloudinit.user | mandatory(
          'Error: provision_specs.cloudinit.user is undefined in host_vars'
        )
      }}
    final_ci_sshkeys: >-
      {{ provision_specs.cloudinit.sshkeys | ternary(provision_specs.cloudinit.sshkeys, '') }}
  tags: always

- name: Import download_image task
  ansible.builtin.import_tasks: download_image.yml
  tags:
    - download_image

- name: Import create_vm task
  ansible.builtin.import_tasks: create_vm.yml
  tags:
    - create_vm

- name: Import start_vm task
  ansible.builtin.import_tasks: start_vm.yml
  tags:
    - start_vm

- name: Import stop_vm task
  ansible.builtin.import_tasks: stop_vm.yml
  tags:
    - stop_vm

- name: Import remove_vm task
  ansible.builtin.import_tasks: remove_vm.yml
  tags:
    - remove_vm
